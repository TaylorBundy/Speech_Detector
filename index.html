<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="shortcut icon" id="favicon" href="Images/favicon.webp" />

    <title>Detector Portugués</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="contenedor">
      <h1>Detector Portugués BR</h1>
      <div class="radioContainer">
        <label class="labels">
          <input type="radio" id="Español" class="radio" disabled />Español
        </label>
        <label class="labels">
          <input type="radio" id="Portugues" class="radio" checked />Portugués
          BR
        </label>
      </div>

      <div id="estado">Esperando...</div>

      <h3>Idioma</h3>
      <div id="idioma">-</div>

      <h3>Texto Original</h3>
      <div id="original"></div>

      <!-- <div class="traduccionContainer"> -->
      <h3>Traducción</h3>
      <div class="traduccionContainer">
        <div id="traducido"></div>
        <div class="play-button">
          <button
            title="play"
            id="btnPlay"
            class="btnPlay"
            onclick="leerTexto()"
          >
            <!-- <img src="Images/play.avif" /> -->
          </button>
        </div>
      </div>

      <div id="microfonoEstado" class="apagado">🔴 Micrófono desactivado</div>

      <button id="toggleMic">🎤 Activar micrófono</button>

      <!-- <div class="botones">
        <button id="iniciar">Iniciar</button>
        <button id="detener">Detener</button>
      </div> -->
    </div>

    <script src="script.js"></script>
  </body>
</html>
